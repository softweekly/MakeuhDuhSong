version: '3.8'

services:
  parody-song-creator:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: music-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=web_app.py
    env_file:
      - .env
    volumes:
      # Mount projects directory to persist data
      - ./parody_projects:/app/parody_projects
      # Mount logs directory (create if needed)
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - music-app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Future services can be added here:
  # nginx:
  #   image: nginx:alpine
  #   container_name: music-app-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   depends_on:
  #     - parody-song-creator
  #   networks:
  #     - music-app-network

  # redis:
  #   image: redis:alpine
  #   container_name: music-app-redis
  #   networks:
  #     - music-app-network

networks:
  music-app-network:
    driver: bridge

# Volumes for persistent data
volumes:
  parody_projects:
  app_logs: